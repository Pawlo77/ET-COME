name: "Publish"

on:
  push:
    branches:
      - feature/pypi # for development testing
    tags:
      - "v*.*.*"

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Build
        working-directory: mllm_shap
        run: uv build
      - name: Publish
        run: uv publish
